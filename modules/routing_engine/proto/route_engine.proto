syntax = "proto3";

package route_engine;

enum Objective {
    FASTEST = 0;
    SHORTEST = 1;
}

message Coordinate {
    double lat = 1;
    double lng = 2;
    double segment_consumed_kwh = 3;
}

enum PortType {
    UNKNOWN_PORT = 0;
    IEC_62196_T2 = 1;
    CHADEMO = 2;
    CCS1 = 3;
    CCS2 = 4;
    TESLA_S = 5;
    BHARAT_DC = 6;
    WALL_PLUG = 7;
}

// NEW: Structured node for binary transport (replaces OSM JSON nodes)
message NodeProto {
    int32  id    = 1;
    double lat   = 2;
    double lng   = 3;
    string name  = 4;
 
    // NEW (v2.1.0): 3D Topography & EV Charging Data
    double elevation = 5;
    double elevation_confidence = 6;
    bool is_charger = 7;
    string charger_type = 8;
    double kw_output = 9;
    bool is_operational = 10;
    repeated PortType available_ports = 11;
    bool is_emergency_assumption = 12;
}

// NEW: Structured edge for binary transport (replaces OSM JSON ways)
message EdgeProto {
    int32  u         = 1;   // source internal node ID
    int32  v         = 2;   // dest internal node ID
    double weight_m  = 3;   // Haversine distance in meters (pre-computed)
    int32  speed_kmh = 4;
    string road_type = 5;
}

// NEW: Replaces the raw OSM JSON string. Pre-structured graph topology.
// The Cache module serializes this once; the routing engine just ParseFromString().
message MapPayload {
    repeated NodeProto nodes = 1;
    repeated EdgeProto edges = 2;
}

message EVParams {
    double effective_mass_kg = 1;
    double Crr = 2;
    double wheel_radius_m = 3;
    double ac_kw_max = 4;
    double dc_kw_max = 5;
    double max_regen_power_kw = 6;
    double energy_uncertainty_margin_pct = 7;
    double battery_soh_pct = 8;
    double start_soc_kwh = 9;
    double min_waypoint_soc_kwh = 10;
    double min_arrival_soc_kwh = 11;
    double target_charge_bound_kwh = 12;
    bool enabled = 13;
    
    // NEW (v2.1.0): Enhanced physical coefficients for high-fidelity modeling
    double drag_coeff = 14;           // dimensionless (Cd)
    double frontal_area_m2 = 15;      // meters squared (A)
    double regen_efficiency = 16;     // 0.0 - 1.0 (eta_regen)
    double aux_power_kw = 17;         // kilowatts (P_aux)
}

message RouteRequest {
    Coordinate start = 1;
    Coordinate end = 2;
    int32 mock_hour = 3;
    Objective objective = 4;
    
    // DEPRECATED (v1): Raw OSM JSON string. Heavy to parse. Kept for backward
    // compatibility during Cache module transition. Will be removed in a future
    // major version once the Cache module sends map_data_pb instead.
    // Do NOT use in new code. Prefer map_data_pb + region_id.
    string map_data = 5;

    // NEW (v2): Geographic region identifier used as the C++ Graph Cache key.
    // Format convention: "bbox:<lat_min>_<lng_min>_<lat_max>_<lng_max>"
    // Example: "bbox:51.4_-0.18_51.6_-0.09"
    // If empty string, no caching is performed (per-request graph build).
    string region_id = 6;

    // NEW (v2): Binary-serialized MapPayload message.
    // Produced by: MapPayload.SerializeToString() in the Cache module.
    // Consumed by: ParseFromString() in server.py (~µs cost).
    // Takes priority over string map_data when both are present.
    bytes map_data_pb = 7;
 
    // NEW (v2.1.0): EV-specific physics and constraint parameters.
    // If null/missing, engine falls back to legacy distance/time metrics.
    EVParams ev_params = 8;
}

message AlgorithmResult {
    string algorithm = 1;
    repeated Coordinate polyline = 2;
    double distance = 3;
    double duration = 4;
    int32 nodes_expanded = 5;
    double exec_time_ms = 6;
    double path_cost = 7;
    // NEW: Diagnostic fields
    string debug_logs = 8;
    bool circuit_breaker_triggered = 9;
 
    // NEW (v2.1.0): EV Execution Data
    double arrival_soc_kwh = 10;
    double consumed_kwh = 11;
    bool is_charging_stop = 12;
}

message RouteResponse {
    repeated AlgorithmResult results = 1;
}

service RouteService {
    rpc CalculateRoute (RouteRequest) returns (RouteResponse) {}
}
